<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTT Nodo Morón – Alimentos Agroecológicos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Outfit', sans-serif; background-color: #fdfaf5; scroll-behavior: smooth; }
    .serif { font-family: 'Playfair Display', serif; }
    
    /* Previene el bloqueo de scroll accidental */
    .no-scroll { overflow: hidden; }
    
    /* Animaciones suaves */
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    #delivery-bar { transition: background-color 0.3s ease; }
  </style>
</head>
<body class="text-stone-800">

  <div id="delivery-bar" class="bg-emerald-900 text-white py-2.5 px-4 text-center text-sm font-medium sticky top-0 z-[60] shadow-md">
    <div class="max-w-6xl mx-auto flex items-center justify-center gap-2">
      <i data-lucide="truck" class="w-4 h-4 text-emerald-300"></i>
      <span id="delivery-status">Entregas en Morón, Haedo y Castelar</span>
      <button onclick="openDeliveryModal()" class="ml-2 bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full text-[11px] uppercase tracking-wider transition-all">Configurar</button>
    </div>
  </div>

  <header class="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-[40px] z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="bg-emerald-600 p-1.5 rounded-lg text-white">
          <i data-lucide="leaf" class="w-5 h-5"></i>
        </div>
        <h1 class="serif text-xl font-bold">UTT <span class="text-emerald-700 underline decoration-emerald-200">Nodo Morón</span></h1>
      </div>
      <div class="flex items-center gap-4">
        <button class="relative p-2 text-stone-600 hover:text-emerald-600 transition-colors">
          <i data-lucide="shopping-basket"></i>
          <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="mb-12 text-center md:text-left">
      <h2 class="serif text-4xl md:text-5xl text-stone-900 mb-4">Soberanía alimentaria <br class="hidden md:block"> en tu mesa.</h2>
      <p class="text-stone-500 text-lg max-w-2xl">Productos frescos de la tierra, sin agrotóxicos y a precio justo.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      <div class="bg-white rounded-3xl border border-stone-200 overflow-hidden hover:shadow-xl hover:shadow-emerald-900/5 transition-all group">
        <div class="aspect-video bg-stone-100 relative overflow-hidden">
          <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
          <span class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-emerald-800 shadow-sm uppercase tracking-tighter">Más vendido</span>
        </div>
        <div class="p-6">
          <h3 class="font-bold text-xl mb-1 text-stone-800">Bolsón de Estación (5kg)</h3>
          <p class="text-stone-500 text-sm mb-6 leading-relaxed">Variedad de 7 a 9 hortalizas frescas según cosecha del día.</p>
          <div class="flex items-center justify-between pt-4 border-t border-stone-100">
            <span class="text-2xl font-bold text-stone-900">$8.500</span>
            <button onclick="addToCart('Bolsón Estación')" class="bg-emerald-700 hover:bg-emerald-800 text-white px-6 py-3 rounded-2xl font-bold transition-all active:scale-95">Agregar</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="delivery-modal" class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-8 fade-in">
      <div class="flex justify-between items-center mb-6">
        <h3 class="serif text-2xl">Configurar Entrega</h3>
        <button onclick="closeDeliveryModal()" class="text-stone-400 hover:text-stone-900">
          <i data-lucide="x-circle"></i>
        </button>
      </div>

      <div class="grid grid-cols-2 gap-3 mb-8 bg-stone-100 p-1.5 rounded-2xl">
        <button id="mode-retiro" onclick="toggleMode('retiro')" class="py-3 rounded-xl font-bold text-sm transition-all bg-white shadow-sm text-emerald-700">Retiro en Nodo</button>
        <button id="mode-envio" onclick="toggleMode('envio')" class="py-3 rounded-xl font-bold text-sm transition-all text-stone-500">Envío a Domicilio</button>
      </div>

      <div id="form-envio" class="hidden space-y-5">
        <div>
          <label class="text-[11px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Localidad</label>
          <select id="localidad" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
            <option>Morón Centro</option>
            <option>Castelar</option>
            <option>Haedo</option>
            <option>Villa Sarmiento</option>
          </select>
        </div>
        <div class="grid grid-cols-4 gap-3">
          <div class="col-span-3">
            <label class="text-[11px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Calle</label>
            <input type="text" id="calle" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500" placeholder="Ej: Agüero">
          </div>
          <div>
            <label class="text-[11px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Altura</label>
            <input type="text" id="altura" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500" placeholder="123">
          </div>
        </div>
      </div>

      <button onclick="saveDelivery()" class="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold mt-8 hover:bg-emerald-700 transition-all shadow-lg shadow-stone-900/10">Confirmar Datos</button>
    </div>
  </div>

  <script>
    lucide.createIcons();
    let currentMode = 'retiro';
    let isDeliveryConfigured = false;

    function openDeliveryModal() {
      document.getElementById('delivery-modal').classList.remove('hidden');
      document.getElementById('delivery-modal').classList.add('flex');
      document.body.classList.add('no-scroll');
    }

    function closeDeliveryModal() {
      document.getElementById('delivery-modal').classList.add('hidden');
      document.getElementById('delivery-modal').classList.remove('flex');
      document.body.classList.remove('no-scroll');
    }

    function toggleMode(mode) {
      currentMode = mode;
      const form = document.getElementById('form-envio');
      const bRetiro = document.getElementById('mode-retiro');
      const bEnvio = document.getElementById('mode-envio');

      if (mode === 'envio') {
        form.classList.remove('hidden');
        bEnvio.className = "py-3 rounded-xl font-bold text-sm transition-all bg-white shadow-sm text-emerald-700";
        bRetiro.className = "py-3 rounded-xl font-bold text-sm transition-all text-stone-500";
      } else {
        form.classList.add('hidden');
        bRetiro.className = "py-3 rounded-xl font-bold text-sm transition-all bg-white shadow-sm text-emerald-700";
        bEnvio.className = "py-3 rounded-xl font-bold text-sm transition-all text-stone-500";
      }
    }

    function saveDelivery() {
      const bar = document.getElementById('delivery-bar');
      const status = document.getElementById('delivery-status');
      
      if (currentMode === 'envio') {
        const calle = document.getElementById('calle').value;
        const localidad = document.getElementById('localidad').value;
        if (!calle) { alert("Por favor ingresá tu calle"); return; }
        status.innerText = `Envío a: ${calle}, ${localidad}`;
      } else {
        status.innerText = "Retiro por Nodo Morón";
      }

      isDeliveryConfigured = true;
      bar.classList.replace('bg-emerald-900', 'bg-stone-800');
      closeDeliveryModal();
    }

    function addToCart(product) {
      if (!isDeliveryConfigured) {
        openDeliveryModal();
      } else {
        const count = document.getElementById('cart-count');
        count.innerText = parseInt(count.innerText) + 1;
        // Animación de feedback
        count.classList.add('scale-125');
        setTimeout(() => count.classList.remove('scale-125'), 200);
      }
    }
  </script>
</body>
</html>
